name: Generate GitHub Stats

on:
  push:
    branches: [main]
    paths-ignore:
      - 'stats.svg'
      - 'profile-3d-contrib/**'
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch Stats and Generate SVG
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          FROM_DATE=$(date -d "365 days ago" -u +"%Y-%m-%dT00:00:00Z")
          TO_DATE=$(date -u +"%Y-%m-%dT23:59:59Z")
          
          RESPONSE=$(curl -s -H "Authorization: bearer $GH_TOKEN" -X POST \
            -d "{\"query\":\"query { user(login: \\\"Vishwaksen0124\\\") { contributionsCollection(from: \\\"$FROM_DATE\\\", to: \\\"$TO_DATE\\\") { totalCommitContributions totalPullRequestContributions totalIssueContributions restrictedContributionsCount contributionCalendar { totalContributions } } repositories(first: 100, ownerAffiliations: [OWNER, COLLABORATOR, ORGANIZATION_MEMBER]) { totalCount nodes { stargazerCount } } followers { totalCount } }}\"}" \
            https://api.github.com/graphql)
          
          TOTAL=$(echo $RESPONSE | jq '.data.user.contributionsCollection.contributionCalendar.totalContributions // 0')
          COMMITS=$(echo $RESPONSE | jq '.data.user.contributionsCollection.totalCommitContributions // 0')
          PRS=$(echo $RESPONSE | jq '.data.user.contributionsCollection.totalPullRequestContributions // 0')
          REPOS=$(echo $RESPONSE | jq '.data.user.repositories.totalCount // 0')
          STARS=$(echo $RESPONSE | jq '[.data.user.repositories.nodes[].stargazerCount] | add // 0')
          FOLLOWERS=$(echo $RESPONSE | jq '.data.user.followers.totalCount // 0')
          
          JSON="{\"total\":$TOTAL,\"commits\":$COMMITS,\"prs\":$PRS,\"stars\":$STARS,\"repos\":$REPOS,\"followers\":$FOLLOWERS}"
          echo "Stats: $JSON"
          python3 generate_stats.py "$JSON"
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          git diff --staged --quiet || git commit -m "Update stats"
          git pull --rebase origin main
          git push
