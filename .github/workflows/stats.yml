name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Stats SVG
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          # Get dates for last 365 days
          FROM_DATE=$(date -d "365 days ago" -u +"%Y-%m-%dT00:00:00Z")
          TO_DATE=$(date -u +"%Y-%m-%dT23:59:59Z")
          
          echo "Fetching contributions from $FROM_DATE to $TO_DATE"
          
          # Fetch contribution data with date range (last 365 days)
          RESPONSE=$(curl -s -H "Authorization: bearer $GH_TOKEN" -X POST \
            -d "{\"query\":\"query { user(login: \\\"Vishwaksen0124\\\") { contributionsCollection(from: \\\"$FROM_DATE\\\", to: \\\"$TO_DATE\\\") { totalCommitContributions totalPullRequestContributions totalIssueContributions restrictedContributionsCount contributionCalendar { totalContributions } } repositories(first: 100, ownerAffiliations: [OWNER, COLLABORATOR, ORGANIZATION_MEMBER]) { totalCount } followers { totalCount } }}\"}" \
            https://api.github.com/graphql)
          
          echo "API Response: $RESPONSE"
          
          # Parse values - use contributionCalendar.totalContributions for accurate count
          TOTAL=$(echo $RESPONSE | jq '.data.user.contributionsCollection.contributionCalendar.totalContributions')
          COMMITS=$(echo $RESPONSE | jq '.data.user.contributionsCollection.totalCommitContributions')
          PRIVATE=$(echo $RESPONSE | jq '.data.user.contributionsCollection.restrictedContributionsCount')
          PRS=$(echo $RESPONSE | jq '.data.user.contributionsCollection.totalPullRequestContributions')
          ISSUES=$(echo $RESPONSE | jq '.data.user.contributionsCollection.totalIssueContributions')
          REPOS=$(echo $RESPONSE | jq '.data.user.repositories.totalCount')
          FOLLOWERS=$(echo $RESPONSE | jq '.data.user.followers.totalCount')
          
          echo "Total: $TOTAL, Commits: $COMMITS, Private: $PRIVATE, PRs: $PRS"
          
          # Generate SVG
          cat > stats.svg << EOF
<svg width="495" height="195" viewBox="0 0 495 195" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="0.5" y="0.5" width="494" height="194" rx="4.5" fill="#0d1117" stroke="#30363d"/>
  <text x="25" y="35" fill="#58a6ff" font-family="Segoe UI, Ubuntu, sans-serif" font-weight="600" font-size="18">Vishwaksen's GitHub Stats</text>
  
  <g transform="translate(25, 55)">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="#58a6ff">
      <path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/>
    </svg>
    <text x="25" y="12" fill="#c9d1d9" font-family="Segoe UI, Ubuntu, sans-serif" font-size="14">Total Contributions (Last Year)</text>
    <text x="380" y="12" fill="#c9d1d9" font-family="Segoe UI, Ubuntu, sans-serif" font-size="14" font-weight="bold">${TOTAL}</text>
  </g>
  
  <g transform="translate(25, 85)">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="#58a6ff">
      <path d="M1.643 3.143L.427 1.927A.25.25 0 000 2.104V5.75c0 .138.112.25.25.25h3.646a.25.25 0 00.177-.427L2.715 4.215a6.5 6.5 0 11-1.18 4.458.75.75 0 10-1.493.154 8.001 8.001 0 101.6-5.684zM7.75 4a.75.75 0 01.75.75v2.992l2.028.812a.75.75 0 01-.557 1.392l-2.5-1A.75.75 0 017 8.25v-3.5A.75.75 0 017.75 4z"/>
    </svg>
    <text x="25" y="12" fill="#c9d1d9" font-family="Segoe UI, Ubuntu, sans-serif" font-size="14">Commits</text>
    <text x="380" y="12" fill="#c9d1d9" font-family="Segoe UI, Ubuntu, sans-serif" font-size="14" font-weight="bold">${COMMITS}</text>
  </g>
  
  <g transform="translate(25, 115)">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="#58a6ff">
      <path d="M7.177 3.073L9.573.677A.25.25 0 0110 .854v4.792a.25.25 0 01-.427.177L7.177 3.427a.25.25 0 010-.354zM3.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122v5.256a2.251 2.251 0 11-1.5 0V5.372A2.25 2.25 0 011.5 3.25zM11 2.5h-1V4h1a1 1 0 011 1v5.628a2.251 2.251 0 101.5 0V5A2.5 2.5 0 0011 2.5zm1 10.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0zM3.75 12a.75.75 0 100 1.5.75.75 0 000-1.5z"/>
    </svg>
    <text x="25" y="12" fill="#c9d1d9" font-family="Segoe UI, Ubuntu, sans-serif" font-size="14">Pull Requests</text>
    <text x="380" y="12" fill="#c9d1d9" font-family="Segoe UI, Ubuntu, sans-serif" font-size="14" font-weight="bold">${PRS}</text>
  </g>
  
  <g transform="translate(25, 145)">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="#58a6ff">
      <path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8z"/>
    </svg>
    <text x="25" y="12" fill="#c9d1d9" font-family="Segoe UI, Ubuntu, sans-serif" font-size="14">Repositories</text>
    <text x="380" y="12" fill="#c9d1d9" font-family="Segoe UI, Ubuntu, sans-serif" font-size="14" font-weight="bold">${REPOS}</text>
  </g>
  
  <g transform="translate(25, 175)">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="#58a6ff">
      <path d="M5.5 3.5a2 2 0 100 4 2 2 0 000-4zM2 5.5a3.5 3.5 0 115.898 2.549 5.507 5.507 0 013.034 4.084.75.75 0 11-1.482.235 4.001 4.001 0 00-7.9 0 .75.75 0 01-1.482-.236A5.507 5.507 0 013.102 8.05 3.49 3.49 0 012 5.5zM11 4a.75.75 0 100 1.5 1.5 1.5 0 01.666 2.844.75.75 0 00-.416.672v.352a.75.75 0 00.574.73c1.2.289 2.162 1.2 2.522 2.372a.75.75 0 101.434-.44 5.01 5.01 0 00-2.56-3.012A3 3 0 0011 4z"/>
    </svg>
    <text x="25" y="12" fill="#c9d1d9" font-family="Segoe UI, Ubuntu, sans-serif" font-size="14">Followers</text>
    <text x="380" y="12" fill="#c9d1d9" font-family="Segoe UI, Ubuntu, sans-serif" font-size="14" font-weight="bold">${FOLLOWERS}</text>
  </g>
</svg>
EOF
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          git diff --staged --quiet || git commit -m "Update stats"
          git push
